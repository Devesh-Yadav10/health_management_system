<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="login-section" class="container">
        <h2>Health Management Portal</h2>
        <form id="login-form">
            <input type="email" id="email" placeholder="Patient Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>

    <div id="dashboard-section" class="container hidden">
        <header>
            <h2 id="welcome-message">Welcome, Patient</h2>
            <button id="logout-btn" class="secondary-btn">Logout</button>
        </header>

        <div class="dashboard-grid">
            <div class="card">
                <h3>Recent Medical Records</h3>
                <ul id="records-list">
                    </ul>
            </div>

            <div class="card">
                <h3>Upcoming Appointments</h3>
                <ul id="appointments-list">
                    </ul>
                <button id="book-btn">Book New Appointment</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
